name: Tests

on:
  push:
  pull_request:

jobs:
  org-roam-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-${{ hashFiles('tools/org-roam-mcp/deps.edn') }}

      - name: Run tests
        working-directory: tools/org-roam-mcp
        run: clojure -X:test
